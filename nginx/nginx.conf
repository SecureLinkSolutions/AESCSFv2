server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # ── oauth2-proxy UI (/oauth2/sign_in, /oauth2/callback, /oauth2/sign_out)
    # These MUST NOT be behind auth_request — they ARE the auth flow.
    location /oauth2/ {
        proxy_pass       http://oauth2-proxy:4180;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        # The session cookie (including access token) can exceed 4 KB and is
        # split into multiple Set-Cookie headers by oauth2-proxy.  Increase the
        # response-header buffer so nginx doesn't 502 on the /oauth2/callback.
        proxy_buffer_size    32k;
        proxy_buffers        4 32k;
        proxy_busy_buffers_size 64k;
    }

    # ── auth_request subrequest endpoint ─────────────────────────────────
    # nginx calls this for every protected request.
    # oauth2-proxy returns 202 (authenticated) or 401 (not authenticated).
    # On 202 it also sets X-Auth-Request-* response headers that nginx
    # captures via auth_request_set below.
    location = /oauth2/auth {
        proxy_pass                 http://oauth2-proxy:4180;
        proxy_pass_request_body    off;
        proxy_set_header           Content-Length     "";
        proxy_set_header           X-Original-URI     $request_uri;
        proxy_set_header           X-Real-IP          $remote_addr;
        proxy_set_header           X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header           X-Forwarded-Proto  $scheme;
        proxy_set_header           X-Forwarded-Host   $host;
    }

    # ── Login page — served without auth so users see it while signed out ───
    location = /login {
        alias /usr/share/nginx/html/login.html;
        add_header Cache-Control "no-store";
    }

    # ── /config.js — generated at container start ─────────────────────────
    location = /config.js {
        alias /usr/share/nginx/html/config.js;
        add_header Cache-Control "no-store";
    }

    # ── /api/* — auth-gated, proxied to Node.js API ───────────────────────
    client_max_body_size 25m;

    location /api/ {
        # Authenticate via oauth2-proxy
        auth_request /oauth2/auth;

        # Capture identity headers from the auth subrequest response
        auth_request_set $auth_user         $upstream_http_x_auth_request_user;
        auth_request_set $auth_email        $upstream_http_x_auth_request_email;
        auth_request_set $auth_pref_user    $upstream_http_x_auth_request_preferred_username;
        auth_request_set $auth_access_token $upstream_http_x_auth_request_access_token;

        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Inject identity into the API request
        proxy_set_header X-Auth-Request-User               $auth_user;
        proxy_set_header X-Auth-Request-Email              $auth_email;
        proxy_set_header X-Auth-Request-Preferred-Username $auth_pref_user;
        proxy_set_header X-Auth-Request-Access-Token       $auth_access_token;
    }

    # ── SPA fallback — auth-gated ─────────────────────────────────────────
    location / {
        auth_request /oauth2/auth;
        error_page 401 = @oauth2_sign_in;

        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # ── Static assets — public (no sensitive data, API is still protected)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Redirect unauthenticated visitors to the branded login page ──────
    location @oauth2_sign_in {
        return 302 /login?rd=$request_uri;
    }
}
