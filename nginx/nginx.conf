server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;

    # ── Strip client-supplied identity headers before they reach the API ──
    # oauth2-proxy re-injects them after validating the session.
    # This prevents a compromised client from spoofing identity
    # even on the internal network.
    proxy_set_header X-Auth-Request-User         "";
    proxy_set_header X-Auth-Request-Email        "";
    proxy_set_header X-Auth-Request-Access-Token "";

    # ── /config.js — generated at container start from environment vars ──
    location = /config.js {
        alias /usr/share/nginx/html/config.js;
        add_header Cache-Control "no-store";
    }

    # ── /api/* — proxy to the Node.js backend ───────────────────────────
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Forward oauth2-proxy identity headers to the API
        proxy_set_header X-Auth-Request-User         $http_x_auth_request_user;
        proxy_set_header X-Auth-Request-Email        $http_x_auth_request_email;
        proxy_set_header X-Auth-Request-Access-Token $http_x_auth_request_access_token;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
