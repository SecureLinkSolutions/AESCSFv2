# ── Rate-limit zones (http context) ──────────────────────────────────────────
#
# These directives are included at the http block level by nginx's conf.d/
# include mechanism. Zones are referenced by limit_req in app.conf.
#
# oauth2_login  — throttle the OAuth2 sign-in / callback flow (10 req/min per IP)
#                 Prevents automated login attempts against the Entra ID OIDC flow.
# ─────────────────────────────────────────────────────────────────────────────

limit_req_zone $binary_remote_addr zone=oauth2_login:10m rate=10r/m;
