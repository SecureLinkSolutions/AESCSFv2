version: "3.9"

# ── AESCSF v2 Evidence Tracker — on-prem stack ───────────────────────────────
#
# Usage:
#   1. Copy .env.example to .env and fill in your EntraID values.
#   2. Set HOST_BIND to your server's internal NIC IP (e.g. 192.168.1.10).
#      Leave it as 127.0.0.1 if you only need localhost access.
#   3. docker compose up -d
#   4. Browse to http://<HOST_BIND>
#
# The port is bound only to the internal interface specified by HOST_BIND,
# so it is never reachable from the internet even without a firewall rule.
# Nginx also enforces RFC 1918 allow-list rules as a second layer of defence.
#
# To enable HTTPS, place a reverse proxy (Traefik, Nginx, HAProxy) in front
# and terminate TLS there. The app itself listens on HTTP port 80.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Frontend — Nginx serves index.html and proxies /api/* to the backend ──
  frontend:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      # Bind only to the internal NIC — never exposed on 0.0.0.0
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-80}:80"
    environment:
      AESCSF_CLIENT_ID:     "${AESCSF_CLIENT_ID}"
      AESCSF_TENANT_ID:     "${AESCSF_TENANT_ID}"
      AESCSF_STORAGE_MODE:  "${AESCSF_STORAGE_MODE:-api}"
    depends_on:
      - api
    restart: unless-stopped

  # ── Backend — Express API with SQLite persistence ──────────────────────────
  api:
    build:
      context: server
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      ENTRA_TENANT_ID:     "${AESCSF_TENANT_ID}"
      ENTRA_CLIENT_ID:     "${AESCSF_CLIENT_ID}"
      AESCSF_ADMIN_OIDS:   "${AESCSF_ADMIN_OIDS}"
      ALLOWED_ORIGIN:      "${ALLOWED_ORIGIN}"
      PORT:             "3000"
      DATA_DIR:         "/data"
    volumes:
      - aescsf_data:/data
    restart: unless-stopped

volumes:
  aescsf_data:
    driver: local
