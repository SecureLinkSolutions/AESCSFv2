version: "3.9"

# ── AESCSF v2 Evidence Tracker — on-prem stack ───────────────────────────────
#
# Authentication is handled by oauth2-proxy in auth_request mode.
#
# Request flow:
#   Browser → nginx (port 80) ─► auth_request ► oauth2-proxy (internal)
#                              │  (nginx injects X-Auth-Request-* from response)
#                              └► API / static files
#
# oauth2-proxy is NOT the reverse proxy — it only validates sessions.
# nginx is the sole internet-facing entry point.
#
# Usage:
#   1. cp .env.example .env  and fill in all values
#   2. docker compose up -d --build
#   3. Browse to http://<HOST_BIND>
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Nginx — sole internet-facing entry point ──────────────────────────────
  # Serves the static app, protects every route via auth_request to
  # oauth2-proxy, and proxies /api/* to the backend.
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      # Bind only to the internal NIC — never exposed on 0.0.0.0
      - "${HOST_BIND:-127.0.0.1}:${HOST_PORT:-80}:80"
    environment:
      AESCSF_STORAGE_MODE: "${AESCSF_STORAGE_MODE:-api}"
      AESCSF_TENANT_ID:    "${AESCSF_TENANT_ID}"
    depends_on:
      api:
        condition: service_healthy
      oauth2-proxy:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/login || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # ── oauth2-proxy — internal auth validator only ───────────────────────────
  # Handles the Azure/Entra ID OAuth flow (/oauth2/*) and validates session
  # cookies for nginx's auth_request subrequests.
  # It is NOT the reverse proxy — UPSTREAMS is set to "static://200" so it
  # returns 202 Accepted once a user is authenticated (nginx ignores the body).
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    expose:
      - "4180"
    environment:
      # Entra ID provider
      OAUTH2_PROXY_PROVIDER:             "azure"
      OAUTH2_PROXY_AZURE_TENANT:         "${AESCSF_TENANT_ID}"
      OAUTH2_PROXY_CLIENT_ID:            "${AESCSF_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET:        "${AESCSF_CLIENT_SECRET}"
      OAUTH2_PROXY_OIDC_ISSUER_URL:      "${OAUTH2_PROXY_OIDC_ISSUER_URL}"
      OAUTH2_PROXY_REDIRECT_URL:         "${OAUTH2_PROXY_REDIRECT_URL}"

      # In auth_request mode oauth2-proxy doesn't proxy to an app upstream.
      # "static://200" returns a 200 OK body after authentication succeeds,
      # which nginx discards — only the X-Auth-Request-* headers matter.
      OAUTH2_PROXY_UPSTREAMS:            "static://200"

      # Session cookie — HTTP-only, never readable by browser JS
      OAUTH2_PROXY_COOKIE_SECRET:        "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_COOKIE_SECURE:        "${OAUTH2_PROXY_COOKIE_SECURE:-false}"
      OAUTH2_PROXY_COOKIE_HTTPONLY:      "true"
      OAUTH2_PROXY_COOKIE_SAMESITE:      "lax"
      OAUTH2_PROXY_COOKIE_NAME:          "_aescsf_session"

      # Inject user identity as response headers on /oauth2/auth
      # nginx captures these via auth_request_set and injects them
      # as request headers to the API.
      OAUTH2_PROXY_SET_XAUTHREQUEST:     "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN:    "true"
      # Azure/Entra ID work accounts store the email in preferred_username,
      # not the standard email claim.
      OAUTH2_PROXY_OIDC_EMAIL_CLAIM:     "preferred_username"

      # Restrict to your org's domain (e.g. yourcompany.com) or * for any
      OAUTH2_PROXY_EMAIL_DOMAINS:        "${OAUTH2_PROXY_EMAIL_DOMAINS:-*}"

      # Allow post-auth redirects to this host and the Azure logout endpoint.
      # Add your production domain to OAUTH2_PROXY_WHITELIST_DOMAINS in .env.
      OAUTH2_PROXY_WHITELIST_DOMAINS:    "${OAUTH2_PROXY_WHITELIST_DOMAINS:-localhost,login.microsoftonline.com}"

      # UX / network
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_HTTP_ADDRESS:         "0.0.0.0:4180"
      OAUTH2_PROXY_REVERSE_PROXY:        "true"
      OAUTH2_PROXY_SCOPE:                "openid email profile"

    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  # ── API — Express + SQLite, identity via proxy headers ────────────────────
  # Body size limits (three-tier):
  #   nginx:   client_max_body_size 25m  (outer gate — allows file uploads up to 25 MB)
  #   multer:  MAX_FILE_BYTES = 20 MB    (per-file limit enforced in server.js)
  #   express: json limit = 4 MB         (assessment JSON; much smaller than file uploads)
  api:
    build:
      context: server
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      AESCSF_SSO_ENABLED: "true"
      AESCSF_ADMIN_OIDS:  "${AESCSF_ADMIN_OIDS}"
      ALLOWED_ORIGIN:     "${ALLOWED_ORIGIN}"
      PORT:               "3000"
      DATA_DIR:           "/data"
    volumes:
      - aescsf_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M

volumes:
  aescsf_data:
    driver: local
